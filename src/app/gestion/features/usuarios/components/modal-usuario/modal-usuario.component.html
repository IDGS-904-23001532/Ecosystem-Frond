<div class="modal-backdrop" *ngIf="isVisible">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Ficha de Usuario</h2>
      <button class="btn-close" (click)="cerrar()">✕</button>
    </div>

    <form [formGroup]="userForm" class="modal-body">
      <div class="form-group">
        <label>Nombre completo</label>
        <input type="text" formControlName="nombre" placeholder="Nombre completo">
      </div>
      
      <div class="form-row">
        <div class="form-group half">
          <label>Teléfono</label>
          <input type="tel" formControlName="telefono" placeholder="Teléfono">
        </div>
        <div class="form-group half">
          <label>Correo</label>
          <input type="email" formControlName="correo" placeholder="Correo electrónico">
        </div>
      </div>

      <div class="form-group">
        <label>Dirección</label>
        <input type="text" formControlName="direccion" placeholder="Dirección completa">
      </div>

      <div class="form-group">
        <label>Rol</label>
        <select formControlName="rol">
          <option value="cliente">Cliente</option>
          <option value="empleado">Empleado</option>
        </select>
      </div>

      <ng-container *ngIf="userForm.get('rol')?.value === 'empleado'">
        <hr class="divider">
        <h3>Datos de Empleado</h3>
        
        <div class="form-row">
          <div class="form-group half">
            <label>Usuario del sistema</label>
            <input type="text" formControlName="usuario" placeholder="Usuario">
          </div>
          <div class="form-group half">
            <label>Contraseña</label>
            <input type="password" formControlName="contrasena" placeholder="Contraseña">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group half">
            <label>Área</label>
            <select formControlName="area">
              <option value="">Seleccione un área...</option>
              <option value="instalacion">Instalación</option>
              <option value="ventas">Ventas</option>
              <option value="soporte">Soporte</option>
            </select>
          </div>
          <div class="form-group half">
            <label>Fecha de Contratación</label>
            <input type="date" formControlName="fechaContratacion">
          </div>
        </div>
      </ng-container>
    </form>

    <div class="modal-footer">
      <app-button [text]="'Guardar'" [type]="'button'" [buttonClass]="'btn-guardar'" (click)="guardar()">
        <span class="icon">⭳</span>
      </app-button>
<app-button [text]="'Cancelar'" [type]="'button'" [buttonClass]="'btn-cancelar'" (click)="cerrar()">
        <span class="icon">✕</span>
      </app-button>
    </div>
  </div>
</div>
