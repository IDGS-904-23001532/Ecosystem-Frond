<section class="hero-section">

    <h4 class="hero-subtitle">
      Dile adiós a las facturas de luz altas,  comienza a 
      <br/>generar tu propia energía limpia y renovable.
    </h4>

    <p class="hero-description">
      Cotización gratis en 2 minutos. Instalación profesional y garantía de 25 años. ¡Empieza a ahorrar hoy!
    </p>
    
    <!--  Boton de Cotización -->
    <app-button [text]="'Cotiza Gratis'" [type]="'submit'" [buttonClass]="'btn-cotizar'" [disabled]="false" onClick="navigateToCotizacion()">

  <div class="hero-image">
