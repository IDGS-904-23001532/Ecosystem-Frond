<section class="relative flex flex-col items-center justify-center min-h-[100dvh] overflow-hidden pt-20">
  
  <!-- Imagen de fondo completa con overlay cinematográfico -->
  <div class="absolute inset-0 z-0">
    <!-- Gradiente para asegurar legibilidad en todas partes -->
    <div class="absolute inset-0 bg-gradient-to-b from-[#0a1f16]/80 via-[#103627]/60 to-[#0a1f16] z-10"></div>
    <!-- Oscurecimiento sutil -->
    <div class="absolute inset-0 bg-black/30 z-10 mix-blend-multiply"></div>
    <img src="/home-hero.png" alt="Paneles Solares" class="w-full h-full object-cover object-center z-0 scale-105" />
  </div>

  <!-- Luces volumétricas (Glows) -->
  <div class="absolute top-0 right-1/4 w-[45vw] h-[45vw] bg-[#84cc16] rounded-full blur-[180px] opacity-15 z-10 pointer-events-none -translate-y-1/2"></div>
  <div class="absolute bottom-0 left-1/4 w-[50vw] h-[50vw] bg-teal-500 rounded-full blur-[200px] opacity-10 z-10 pointer-events-none translate-y-1/2"></div>

  <!-- Contenido Principal -->
  <div class="relative z-20 w-full max-w-7xl px-6 md:px-12 mx-auto flex flex-col items-center justify-center flex-grow mt-10">
    
    <!-- Etiqueta superior minimalista -->
    <div class="inline-flex items-center gap-3 px-5 py-2.5 rounded-full bg-white/5 backdrop-blur-2xl border border-white/10 mb-10 shadow-2xl">
      <div class="w-2 h-2 rounded-full bg-[#84cc16] shadow-[0_0_10px_#84cc16]"></div>
      <span class="text-xs md:text-sm font-semibold text-white/90 tracking-[0.2em] uppercase">Innovación en Energía</span>
    </div>

    <!-- Título principal majestuoso -->
    <h1 class="text-5xl sm:text-6xl md:text-7xl lg:text-[5.5rem] font-extrabold text-white tracking-tight leading-[1.05] text-center mb-8 drop-shadow-2xl">
      Experiencia y tecnología <br class="hidden lg:block"/> en industria energética
    </h1>

    <!-- Subtítulo refinado -->
    <p class="text-lg md:text-xl lg:text-2xl text-slate-300 font-light mb-14 max-w-4xl mx-auto text-center leading-relaxed drop-shadow-md">
      Acelera la transición hacia un futuro sustentable. Soluciones integradas que brindan <strong class="text-white font-medium">energía limpia y confiable</strong> para hogares y empresas, maximizando tu rentabilidad.
    </p>

    <!-- Botones Ultra Premium -->
    <div class="flex flex-col sm:flex-row items-center justify-center gap-6 w-full sm:w-auto">
      <button class="w-full sm:w-auto px-12 py-4 rounded-full bg-[#84cc16] text-white font-bold text-lg hover:bg-[#65a30d] hover:scale-105 transition-all duration-300 shadow-[0_0_40px_rgba(132,204,22,0.3)]">
        Agenda una asesoría
      </button>
      <button (click)="navigateToCalculadora()" class="w-full sm:w-auto px-12 py-4 rounded-full bg-white/5 backdrop-blur-2xl text-white font-bold text-lg border border-white/20 hover:bg-white/10 hover:border-white/40 transition-all duration-300 shadow-xl group flex items-center gap-3 justify-center">
        Calcula tu ahorro
        <span class="material-symbols-rounded text-base group-hover:translate-x-1 transition-transform">arrow_forward</span>
      </button>
    </div>
  </div>

  <!-- Indicador de Scroll para aprovechar el espacio vertical -->
  <div class="relative z-20 pb-8 mt-auto flex flex-col items-center justify-center opacity-70 animate-bounce cursor-default">
    <span class="text-white/60 text-[10px] font-bold tracking-[0.3em] uppercase mb-2">Descubre más</span>
    <span class="material-symbols-rounded text-white/60 text-lg">south</span>
  </div>
</section>
