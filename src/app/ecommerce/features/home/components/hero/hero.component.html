<section class="relative flex flex-col lg:flex-row items-center justify-between min-h-screen overflow-hidden bg-slate-900 pt-20 lg:pt-0">
  <!-- Background Glows -->
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
    <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-emerald-500/20 blur-[120px]"></div>
    <div class="absolute bottom-[10%] -right-[10%] w-[40%] h-[40%] rounded-full bg-teal-500/20 blur-[100px]"></div>
  </div>

  <div class="relative z-10 flex-1 max-w-3xl px-6 py-12 lg:pl-20 mx-auto text-center lg:text-left mt-16 lg:mt-0">

    <h1 class="text-4xl sm:text-5xl lg:text-7xl font-extrabold text-white tracking-tight leading-[1.1] mb-6">
      Paneles Solares para un <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-400">futuro brillante</span>
    </h1>
    
    <h4 class="text-lg lg:text-xl text-slate-300 font-medium mb-8 leading-relaxed max-w-2xl mx-auto lg:mx-0">
      Dile adiós a las facturas de luz altas. Comienza a generar tu propia energía limpia y renovable con instalación profesional y garantía de 25 años.
    </h4>
    
    <div class="flex flex-col sm:flex-row items-center justify-center lg:justify-start gap-4">
      <button (click)="navigateToCotizacion()" class="w-full sm:w-auto px-8 py-4 rounded-xl bg-emerald-600 text-white font-bold text-lg shadow-md hover:bg-emerald-700 hover:-translate-y-1 transition-all duration-300 cursor-pointer">
        Cotiza Gratis
      </button>
      <button class="w-full sm:w-auto px-8 py-4 rounded-xl bg-white/5 hover:bg-white/10 text-white font-bold text-lg backdrop-blur-md border border-white/10 transition-all duration-300 cursor-pointer">
        Conocer Más
      </button>
    </div>
  </div>

  <div class="relative z-10 flex-[1.2] w-full flex justify-center lg:justify-end items-end self-end h-[60vh] lg:h-screen">
    <div class="relative w-full h-full flex items-end justify-center lg:justify-end">
      <!-- Gradient overlay for mobile blending -->
      <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent z-10 lg:hidden"></div>
      <img src="https://enchufesolar.com/wp-content/uploads/2021/08/instalacion_panel-solar.jpg" alt="Equipo Solar" class="w-full h-[50vh] lg:h-auto lg:max-h-[85vh] object-cover object-bottom drop-shadow-2xl z-0 lg:rounded-tl-[100px] lg:border-l-8 lg:border-t-8 border-emerald-500/20">
    </div>
  </div>
</section>
