<div class="min-h-screen w-full bg-[#fcfdfc] font-sans flex flex-col">
  <app-top-bar></app-top-bar>

  <main class="flex-grow pt-32 pb-24">
    <section class="max-w-4xl mx-auto px-6 text-center mb-16">
      <h1 class="text-4xl md:text-5xl font-extrabold text-[#103627] mb-6 tracking-tight">Contáctanos</h1>
      <p class="text-slate-500 text-lg">Estamos aquí para resolver tus dudas y ayudarte a iniciar tu transición energética.</p>
    </section>

    <section class="max-w-3xl mx-auto px-6">
      <div class="bg-white p-10 md:p-14 rounded-[2rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100">
        <form class="flex flex-col gap-6">
          <div class="flex flex-col md:flex-row gap-6">
            <div class="flex-1 flex flex-col gap-2">
              <label class="text-sm font-bold text-[#103627]">Nombre completo</label>
              <input type="text" placeholder="Ej. Juan Pérez" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-4 focus:outline-none focus:border-[#84cc16] focus:bg-white transition-all text-sm" />
            </div>
            <div class="flex-1 flex flex-col gap-2">
              <label class="text-sm font-bold text-[#103627]">Correo electrónico</label>
              <input type="email" placeholder="juan@correo.com" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-4 focus:outline-none focus:border-[#84cc16] focus:bg-white transition-all text-sm" />
            </div>
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-sm font-bold text-[#103627]">Mensaje</label>
            <textarea rows="5" placeholder="¿En qué te podemos ayudar?" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-4 focus:outline-none focus:border-[#84cc16] focus:bg-white transition-all text-sm resize-none"></textarea>
          </div>
          <button type="button" class="w-full py-4 rounded-xl bg-[#84cc16] text-[#103627] font-bold text-lg hover:bg-[#65a30d] transition-all shadow-lg mt-4">
            Enviar mensaje
          </button>
        </form>
      </div>
    </section>
  </main>
</div>
