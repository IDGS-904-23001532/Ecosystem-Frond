<div class="min-h-screen w-full bg-slate-50 font-sans flex flex-col">
  
  <!-- Navegación -->
  <div class="relative z-20">
    <app-top-bar></app-top-bar>
  </div>

  <!-- Contenido Principal -->
  <main class="flex-grow pt-24 lg:pt-32 pb-20">
    <div class="container mx-auto px-6 max-w-6xl">
      
      <!-- Encabezado -->
      <div class="text-center mb-16">
        <h1 class="text-4xl md:text-5xl font-extrabold text-slate-800 mb-6 tracking-tight">
          ¿Por qué <span class="text-emerald-600">escogernos?</span>
        </h1>
        <p class="text-lg md:text-xl text-slate-600 max-w-2xl mx-auto leading-relaxed">
          Somos más que un proveedor de paneles solares. Somos tus aliados estratégicos en la transición hacia la energía limpia y renovable.
        </p>
      </div>

      <!-- Tarjetas -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div *ngFor="let card of cards" 
             class="bg-white rounded-2xl p-8 shadow-lg hover:shadow-xl transition-shadow border border-slate-100 flex flex-col lg:flex-row gap-6 items-start">
          
          <div class="flex-shrink-0 w-16 h-16 rounded-xl flex items-center justify-center {{card.color}}">
            <span class="material-symbols-rounded text-3xl">{{card.icon}}</span>
          </div>
          
          <div>
            <h3 class="text-xl font-bold text-slate-800 mb-3">{{card.title}}</h3>
            <p class="text-slate-600 leading-relaxed">
              {{card.description}}
            </p>
          </div>

        </div>
      </div>

    </div>
  </main>

</div>
