<div class="min-h-screen w-full bg-[#111] relative font-sans overflow-x-hidden flex flex-col" style="background-image: url('https://images.unsplash.com/photo-1448375240586-882707db888b?auto=format&fit=crop&q=80'); background-size: cover; background-position: center;">
  
  <!-- Overlay oscuro para darle el tono verde/negro de la imagen -->
  <div class="absolute inset-0 z-0 bg-gradient-to-r from-black/80 via-black/60 to-black/80"></div>
  <div class="absolute inset-0 z-0 bg-emerald-900/20 mix-blend-overlay"></div>
  
  <!-- TopBar -->
  <div class="relative z-20">
    <app-top-bar></app-top-bar>
  </div>

  <div class="relative z-10 container mx-auto px-8 lg:px-20 pt-24 flex flex-col flex-grow text-white">
    
    <!-- Headers -->
    <div class="mb-14 max-w-2xl mt-8">
      <h1 class="text-5xl md:text-6xl font-extrabold mb-4 tracking-tight">tarifa fija</h1>
      <p class="text-lg md:text-xl text-gray-200 leading-relaxed font-light">
        Ingresa tu consumo actual y estima el ahorro en tu factura eléctrica con PPA y<br>SaaS.
      </p>
    </div>

    <!-- Stepper (Barra oscura con círculos) -->
    <div class="mb-12 max-w-4xl w-full">
      <div class="relative flex items-center justify-between w-full h-12 bg-[#2c3e2e]/70 backdrop-blur-sm rounded-full px-1 border border-white/5 shadow-lg">
        <!-- Linea divisoria imaginaria o espacio, en la imagen es solo la barra -->
        
        <!-- Step 1 (Active) -->
        <div class="flex items-center justify-center w-10 h-10 rounded-full bg-[#00b894] text-white font-bold text-lg ml-1">
          1
        </div>
        
        <!-- Step 2 (Inactive) -->
        <div class="flex items-center justify-center w-10 h-10 rounded-full bg-[#1e4a3b]/60 text-[#00b894] font-bold text-lg">
          2
        </div>
        
        <!-- Step 3 (Inactive) -->
        <div class="flex items-center justify-center w-10 h-10 rounded-full bg-[#1e4a3b]/60 text-[#00b894] font-bold text-lg mr-1">
          3
        </div>
      </div>
    </div>

    <!-- Form Section -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-16 max-w-6xl">
      
      <!-- Field 1 -->
      <div class="flex flex-col gap-3">
        <div class="bg-[#384336]/80 rounded-md overflow-hidden backdrop-blur-sm h-14 flex items-center px-4">
          <input 
            type="text" 
            [(ngModel)]="consumoPromedio"
            placeholder="Consumo promedio" 
            class="w-full bg-transparent border-none text-white focus:outline-none placeholder-gray-300 text-sm"
          >
        </div>
        <label class="text-base font-bold text-white leading-tight">Consumo promedio mensual del último año (kWh)</label>
      </div>

      <!-- Field 2 -->
      <div class="flex flex-col gap-3">
        <div class="bg-[#384336]/80 rounded-md overflow-hidden backdrop-blur-sm h-14 flex items-center px-4 relative">
          <select 
            [(ngModel)]="estado"
            class="w-full bg-transparent border-none text-white focus:outline-none appearance-none cursor-pointer text-sm"
          >
            <option value="" disabled selected class="text-black">- Selecciona -</option>
            <option value="CDMX" class="text-black">Ciudad de México</option>
            <option value="JAL" class="text-black">Jalisco</option>
            <option value="NL" class="text-black">Nuevo León</option>
          </select>
          <!-- Custom arrow icon -->
          <span class="material-symbols-rounded absolute right-3 text-gray-300 pointer-events-none text-sm">expand_more</span>
        </div>
        <label class="text-base font-bold text-white leading-tight">Estado de la República donde está la empresa</label>
      </div>

      <!-- Field 3 -->
      <div class="flex flex-col gap-3">
        <div class="bg-[#384336]/80 rounded-md overflow-hidden backdrop-blur-sm h-14 flex items-center px-4 relative">
          <select 
            [(ngModel)]="tarifa"
            class="w-full bg-transparent border-none text-white focus:outline-none appearance-none cursor-pointer text-sm"
          >
            <option value="" disabled selected class="text-black">- Selecciona -</option>
            <option value="GDMTH" class="text-black">GDMTH</option>
            <option value="GDMTO" class="text-black">GDMTO</option>
            <option value="PDBT" class="text-black">PDBT</option>
          </select>
          <span class="material-symbols-rounded absolute right-3 text-gray-300 pointer-events-none text-sm">expand_more</span>
        </div>
        <label class="text-base font-bold text-white leading-tight">Tarifa que tiene asignada por CFE</label>
      </div>

      <!-- Field 4 -->
      <div class="flex flex-col gap-3">
        <div class="bg-[#384336]/80 rounded-md overflow-hidden backdrop-blur-sm h-14 flex items-center px-4">
          <input 
            type="text" 
            [(ngModel)]="demandaHorarioPunta"
            placeholder="Demanda horario punta (kW)" 
            class="w-full bg-transparent border-none text-white focus:outline-none placeholder-gray-300 text-sm"
          >
        </div>
        <label class="text-base font-bold text-white leading-tight">Demanda horario punta (kW)</label>
      </div>
      
    </div>

    <!-- Actions -->
    <div class="pb-20">
      <button 
        (click)="siguientePaso()"
        class="bg-[#00b894] hover:bg-[#00a383] text-white font-bold px-8 py-3 rounded-md text-base transition-colors shadow-lg cursor-pointer"
      >
        Siguiente
      </button>
    </div>

  </div>
</div>
