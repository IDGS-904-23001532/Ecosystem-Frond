<button
  [type]="type"
  [disabled]="disabled"
  class="w-full px-6 py-3.5 rounded-xl font-bold text-white transition-all duration-200 flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:-translate-y-0 disabled:hover:shadow-none shadow-md {{ buttonClass }}"
  (click)="onClick()">
  {{ text }}
</button>
