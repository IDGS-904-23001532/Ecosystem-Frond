<header class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
  <div>
    <h1 class="text-2xl font-extrabold text-slate-800">{{ title }}</h1>
    <p class="text-slate-500 text-sm mt-1 font-medium">{{ subtitle }}</p>
  </div>
  <div class="flex items-center gap-4">
    <div class="flex flex-col items-end hidden sm:flex">
      <span class="text-sm font-bold text-slate-700">{{ username }}</span>
      <span class="text-xs text-emerald-600 font-semibold bg-emerald-50 px-2 py-0.5 rounded-md mt-0.5">Administrador</span>
    </div>
    <div class="w-12 h-12 rounded-full bg-emerald-100 text-emerald-700 flex items-center justify-center font-bold text-lg border-2 border-white shadow-sm ring-2 ring-emerald-50">
      {{ userInitials }}
    </div>
  </div>
</header>
