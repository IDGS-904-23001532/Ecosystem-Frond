<div class="summary-cards">
  <div class="card" *ngFor="let card of cards">
    
    <div class="card-icon" [ngClass]="card.iconClass">
      <span>{{ card.icon }}</span> 
    </div>
    
    <div class="card-info">
      <span class="card-label">{{ card.label }}</span>
      <span class="card-value">{{ card.value }}</span>
    </div>

  </div>
</div>
