<div class="flex flex-col gap-1.5 w-full mb-4" [formGroup]="parentForm">
  <label [for]="controlName" class="text-sm font-semibold text-slate-700">{{ label }}</label>
  <div class="relative flex items-center group">
    <span class="material-symbols-rounded absolute left-4 text-slate-400 group-focus-within:text-emerald-500 transition-colors pointer-events-none" *ngIf="icon">{{ icon }}</span>
    <input
      [type]="type"
      [id]="controlName"
      [formControlName]="controlName"
      [placeholder]="placeholder"
      class="w-full py-3.5 pr-4 rounded-xl bg-slate-50 border-2 border-slate-100 focus:bg-white focus:border-emerald-500 transition-all outline-none text-slate-700 font-medium placeholder:text-slate-400"
      [ngClass]="{'pl-12': icon, 'pl-4': !icon, 'border-red-400 focus:border-red-500 bg-red-50': isInvalid}"
    />
  </div>
</div>
